        <dc:description>Elaborate sign for a statue in Cairo CGC 34504 (KRI II, 361, 11).
For font hamonisation, the actual drawing is composed  from KRI II, 361, II, face of A1 sign in JSesh font, and prostrate statue of King, from Rekhmire tomb, pl. XXXVII. The last one is not a hieroglyph, but a fulll scale drawing.
</dc:description>
