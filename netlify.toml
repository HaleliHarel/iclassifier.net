[build]
  publish = "."

# Simple static website - no build commands needed

# Proxy the React app from the separate Netlify site
[[redirects]]
  from = "/app/*"
  to = "https://archaeomind.netlify.app/app/:splat"
  status = 200
  force = true

# Proxy image assets used by the React app
[[redirects]]
  from = "/images_line/*"
  to = "https://archaeomind.netlify.app/images_line/:splat"
  status = 200
  force = true
